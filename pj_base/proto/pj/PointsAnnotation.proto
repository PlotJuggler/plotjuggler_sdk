// PlotJuggler canonical image annotation protobuf schema.
// Field layout adapted from Foxglove SDK schemas (MIT License,
// Copyright (c) Foxglove Technologies Inc).

syntax = "proto3";

import "pj/Color.proto";
import "pj/Geometry.proto";
import "pj/KeyValuePair.proto";
import "google/protobuf/timestamp.proto";

package PJ;

// An array of points on a 2D image
message PointsAnnotation {
  // Type of points annotation
  enum Type {
    // Unknown points annotation type
    UNKNOWN = 0;

    // Individual points: 0, 1, 2, ...
    POINTS = 1;

    // Closed polygon: 0-1, 1-2, ..., (n-1)-n, n-0
    LINE_LOOP = 2;

    // Connected line segments: 0-1, 1-2, ..., (n-1)-n
    LINE_STRIP = 3;

    // Individual line segments: 0-1, 2-3, 4-5, ...
    LINE_LIST = 4;
  }

  // Timestamp of annotation
  google.protobuf.Timestamp timestamp = 1;

  // Type of points annotation to draw
  Type type = 2;

  // Points in 2D image coordinates (pixels).
  // These coordinates use the top-left corner of the top-left pixel of the image as the origin.
  repeated PJ.Point2 points = 3;

  // Outline color
  PJ.Color outline_color = 4;

  // Per-point colors, if `type` is `POINTS`, or per-segment stroke colors, if `type` is `LINE_LIST`, `LINE_STRIP` or
  // `LINE_LOOP`.
  repeated PJ.Color outline_colors = 5;

  // Fill color
  PJ.Color fill_color = 6;

  // Stroke thickness in pixels
  double thickness = 7;

  // Additional user-provided metadata associated with this annotation. Keys must be unique.
  repeated PJ.KeyValuePair metadata = 8;
}
