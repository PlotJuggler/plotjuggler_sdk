// PlotJuggler canonical color protobuf schema.
// Field layout adapted from Foxglove SDK schemas (MIT License,
// Copyright (c) Foxglove Technologies Inc).

syntax = "proto3";

package PJ;

// A color in RGBA format
message Color {
  // Red value between 0 and 1
  double r = 1;

  // Green value between 0 and 1
  double g = 2;

  // Blue value between 0 and 1
  double b = 3;

  // Alpha value between 0 and 1
  double a = 4;
}
