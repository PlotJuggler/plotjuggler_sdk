// PlotJuggler canonical point cloud protobuf schemas.
// Wire-level contract for PJ::sdk::PointCloud and PJ::sdk::PointField in
// pj_base/include/pj_base/builtin/PointCloud.hpp.

syntax = "proto3";

import "google/protobuf/timestamp.proto";

package PJ;

// Description of one channel inside a packed point cloud (x, y, z, intensity, rgb, ring, time, ...). Mirrors the shape
// of sensor_msgs/PointField but the datatype enum is canonical PJ vocabulary, not a ROS-specific enum.
message PointField {
  // Scalar data type of one channel element
  enum Datatype {
    // Unknown / unset datatype
    UNKNOWN = 0;

    // Signed 8-bit integer
    INT8 = 1;

    // Unsigned 8-bit integer
    UINT8 = 2;

    // Signed 16-bit integer
    INT16 = 3;

    // Unsigned 16-bit integer
    UINT16 = 4;

    // Signed 32-bit integer
    INT32 = 5;

    // Unsigned 32-bit integer
    UINT32 = 6;

    // IEEE 754 single-precision float (32 bits)
    FLOAT32 = 7;

    // IEEE 754 double-precision float (64 bits)
    FLOAT64 = 8;
  }

  // Channel name (e.g. "x", "y", "z", "intensity", "rgb", "ring", "time")
  string name = 1;

  // Byte offset of this channel within a single point record
  uint32 offset = 2;

  // Scalar data type of one element of this channel
  Datatype datatype = 3;

  // Number of elements of `datatype` per point (typically 1)
  uint32 count = 4;
}

// Packed point cloud. The `data` buffer holds `width * height` points, each occupying `point_step` bytes laid out per
// `fields`. `is_dense = false` means some points may be invalid (typically NaN-filled).
//
// On the SDK side, `data` is exposed as `Span<const uint8_t>` plus a `BufferAnchor`. The anchor is a C++ lifetime
// concept with no wire-format equivalent.
message PointCloud {
  // Timestamp associated with the cloud
  google.protobuf.Timestamp timestamp = 1;

  // Number of points per row, or total points for unorganized clouds
  uint32 width = 2;

  // Number of rows. 1 for unorganized clouds.
  uint32 height = 3;

  // Bytes per point
  uint32 point_step = 4;

  // Bytes per row (= point_step * width when tightly packed)
  uint32 row_step = 5;

  // Big-endian byte order flag for packed numeric fields
  bool is_bigendian = 6;

  // When false, some points may be invalid (typically NaN-filled)
  bool is_dense = 7;

  // Channel layout for each point in `data`
  repeated PJ.PointField fields = 8;

  // Packed point bytes
  bytes data = 9;

  // Source coordinate frame for the points (e.g. "velodyne", "base_link"). 3D consumers TF-transform from this frame to
  // a fixed render frame. Empty when unset; 2D consumers ignore this field.
  string frame_id = 10;
}
