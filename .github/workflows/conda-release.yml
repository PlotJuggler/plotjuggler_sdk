name: conda-release

# Build + publish the SDK conda package to the prefix.dev "plotjuggler" channel
# on tag push. Requires repo secret PREFIX_API_KEY = a prefix.dev token with
# write access to the "plotjuggler" channel.
on:
  push:
    tags:
      - "v*"
  # Manual dispatch builds the current conanfile.py/recipe.yaml version (no tag
  # guard); idempotent via `rattler-build upload --skip-existing`.
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-upload:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]   # extend to macos-15-intel, windows-2022 in a later task
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches conanfile.py and recipe.yaml versions
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          conan_ver="$(grep -E '^\s*version\s*=' conanfile.py | head -1 | sed -E 's/.*"(.*)".*/\1/')"
          # recipe.yaml carries its own context.version (the version embedded in the
          # published .conda). Guard it too so a stale recipe can't ship a mislabeled
          # package. Match only the quoted context line, not the templated package line.
          recipe_ver="$(grep -E '^[[:space:]]+version:[[:space:]]*"' recipe.yaml | head -1 | sed -E 's/.*"(.*)".*/\1/')"
          echo "tag=$tag  conanfile.py=$conan_ver  recipe.yaml=$recipe_ver"
          if [ "$tag" != "$conan_ver" ]; then
            echo "::error::Tag v$tag does not match conanfile.py version ($conan_ver)"
            exit 1
          fi
          if [ "$tag" != "$recipe_ver" ]; then
            echo "::error::Tag v$tag does not match recipe.yaml version ($recipe_ver)"
            exit 1
          fi

      - name: Install rattler-build
        uses: prefix-dev/rattler-build-action@v0.2.38
        with:
          setup-only: true
          rattler-build-version: v0.66.2

      - name: Build conda package
        shell: bash
        run: |
          rattler-build build \
            --recipe recipe.yaml \
            --channel conda-forge \
            --output-dir "${{ runner.temp }}/conda-output"

      - name: Upload to prefix.dev (plotjuggler)
        shell: bash
        env:
          PREFIX_API_KEY: ${{ secrets.PREFIX_API_KEY }}
        run: |
          find "${{ runner.temp }}/conda-output" -name '*.conda' -print0 \
            | xargs -0 rattler-build upload prefix --channel plotjuggler --skip-existing
